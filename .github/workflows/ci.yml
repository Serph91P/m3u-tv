name: Retired Legacy CI

on:
  workflow_dispatch:

jobs:
  retired:
    name: Legacy React Native and Electron CI retired
    runs-on: ubuntu-latest
    steps:
      - name: Point to active Flutter workflow
        run: |
          printf '%s\n' 'Legacy React Native/Expo and Electron CI has been retired.'
          printf '%s\n' 'Use .github/workflows/flutter-client.yml for active Flutter gates.'
